<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Signal · TensorFeed</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root {
      --bg: #08090c;
      --surface: #10131a;
      --border: #232936;
      --text: #e7ecf3;
      --muted: #8b95a7;
      --accent: #3ddc97;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #signal-gate {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #signal-gate.show { display: flex; }
    .gate-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
    }
    .gate-brand {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 20px;
      letter-spacing: 0.06em;
      margin: 0 0 4px;
    }
    .gate-brand .dot { color: var(--accent); }
    .gate-sub { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
    .gate-label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
    .gate-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
    }
    .gate-input:focus { outline: none; border-color: var(--accent); }
    .gate-btn {
      width: 100%;
      margin-top: 22px;
      padding: 11px 12px;
      background: var(--accent);
      color: #04120b;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .gate-btn:disabled { opacity: 0.6; cursor: default; }
    .gate-error { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 12px; }
    .gate-note { color: var(--muted); font-size: 11px; margin-top: 18px; }
  </style>
</head>
<body>
  <div id="signal-gate">
    <form class="gate-card" id="signal-login" autocomplete="off">
      <p class="gate-brand">SIGNAL<span class="dot">.</span></p>
      <p class="gate-sub">TensorFeed internal console</p>
      <label class="gate-label" for="signal-email">Email</label>
      <input class="gate-input" id="signal-email" type="email" name="email" required />
      <label class="gate-label" for="signal-password">Password</label>
      <input class="gate-input" id="signal-password" type="password" name="password" required />
      <button class="gate-btn" id="signal-submit" type="submit">Sign in</button>
      <div class="gate-error" id="signal-error"></div>
      <p class="gate-note">Private. Access is logged.</p>
    </form>
  </div>

  <script>
    // Client-side gate. The HTML shell is public but carries no data; every
    // datapoint the dashboard shows is behind the session-gated /api/signal/*
    // endpoints, which enforce auth server-side. This gate only decides whether
    // to show the login form or boot the dashboard.
    (function () {
      var booted = false;
      function boot() {
        if (booted) return;
        booted = true;
        var s = document.createElement('script');
        s.src = '/signal/vantage.js';
        s.defer = true;
        document.body.appendChild(s);
      }
      function showGate() {
        document.getElementById('signal-gate').classList.add('show');
      }
      async function isAuthed() {
        try {
          var r = await fetch('/api/signal/session', { cache: 'no-store', credentials: 'same-origin' });
          if (!r.ok) return false;
          var j = await r.json();
          return !!(j && j.authed);
        } catch (e) {
          return false;
        }
      }
      async function main() {
        if (await isAuthed()) { boot(); return; }
        showGate();
        var form = document.getElementById('signal-login');
        var btn = document.getElementById('signal-submit');
        var err = document.getElementById('signal-error');
        form.addEventListener('submit', async function (ev) {
          ev.preventDefault();
          err.textContent = '';
          btn.disabled = true;
          btn.textContent = 'Signing in...';
          var email = document.getElementById('signal-email').value;
          var password = document.getElementById('signal-password').value;
          try {
            var r = await fetch('/api/signal/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'same-origin',
              body: JSON.stringify({ email: email, password: password }),
            });
            if (r.ok) { window.location.reload(); return; }
            err.textContent = r.status === 401 ? 'Invalid credentials.' : 'Sign in failed.';
          } catch (e) {
            err.textContent = 'Network error.';
          }
          btn.disabled = false;
          btn.textContent = 'Sign in';
        });
      }
      main();
    })();
  </script>
</body>
</html>
