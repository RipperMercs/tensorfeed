name = "tensorfeed-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "tensorfeed.ai/api/*", zone_name = "tensorfeed.ai" },
  # Trailing * on the single-file patterns is required: Cloudflare Pages
  # default-routes the zone, and exact-path worker routes (no wildcard) lose
  # the tie. /feed/* works because it is already a wildcard.
  { pattern = "tensorfeed.ai/feed.xml*", zone_name = "tensorfeed.ai" },
  { pattern = "tensorfeed.ai/feed.json*", zone_name = "tensorfeed.ai" },
  { pattern = "tensorfeed.ai/feed/*", zone_name = "tensorfeed.ai" }
]

[triggers]
crons = [
  "*/10 * * * *",
  "*/2 * * * *",
  "0 * * * *",
  "0 */2 * * *",
  "0 7 * * *",
  "30 8 * * *",
  # Daily 9:30 AM UTC: capture MCP server registry telemetry from
  # registry.modelcontextprotocol.io. Powers /api/mcp/registry/snapshot
  # (free) and /api/premium/mcp/registry/series (1 credit).
  "30 9 * * *",
  # Daily 11:00 AM UTC: capture top AI/ML papers from Semantic Scholar
  # (worker/src/papers.ts). Five fan-out queries, dedup, rank by citation
  # count. Powers free /api/papers/ai-trending plus a future premium
  # time-series endpoint over the daily papers:daily:{date} keys.
  "0 11 * * *",
  # Daily 11:30 AM UTC: capture recent arXiv submissions in
  # cs.AI/cs.LG/cs.CL/cs.CV (worker/src/arxiv.ts). Atom API, single call,
  # dedup by arxivId. Powers free /api/papers/arxiv-recent.
  "30 11 * * *",
  # Daily 12:00 UTC: capture top 30 most-downloaded models + datasets
  # from Hugging Face (worker/src/hf-trending.ts). Day-over-day deltas
  # against hf:daily:{date} become a real trending signal once we have
  # multiple days. Powers free /api/hf/trending.
  "0 12 * * *",
  # Daily 12:30 UTC: capture currently-hot GitHub issues across AI
  # topics (worker/src/hot-issues.ts). 5 fan-out search queries on
  # is:issue is:open archived:false comments:>=10 updated:>=7d ago,
  # deduped, ranked by comments. Powers free /api/issues/hot.
  "30 12 * * *",
  # Daily 13:00 UTC: capture currently-hot threads from 7 AI-relevant
  # subreddits (worker/src/reddit-trending.ts). LocalLLaMA,
  # MachineLearning, ClaudeAI, OpenAI, singularity, artificial,
  # AI_Agents. Deduped by post id, top 30 by score. Powers free
  # /api/reddit/trending.
  "0 13 * * *",
  # Daily 14:00 UTC: capture the OpenRouter cross-provider model
  # catalog (worker/src/openrouter-catalog.ts). 200+ models normalized
  # across 50+ inference providers with per-token pricing, context
  # window, modality, and provider metadata. Powers free
  # /api/openrouter/models.
  "0 14 * * *",
  # Daily 14:15 UTC: capture HF Daily Papers feed
  # (worker/src/hf-daily-papers.ts). Editor-curated AI papers from
  # huggingface.co/papers with HF community upvotes + discussion
  # counts. Powers free /api/papers/hf-daily. Slot 14:15 chosen to
  # avoid collision with the 14:30 X/Twitter cron.
  "15 14 * * *",
  # Active LLM endpoint probing (worker/src/probe.ts). Every 15 min:
  # POST a tiny prompt at each provider with an API key configured,
  # measure ttfb + total + status, append to a 24h ring buffer, and
  # rewrite the latest summary. Free /api/probe/latest serves the
  # summary; premium /api/premium/probe/series serves daily history.
  "*/15 * * * *",
  # Daily 5 minutes past midnight UTC: roll yesterday's per-provider
  # 24h buffer into a dated daily aggregate for premium time series.
  "5 0 * * *",
  # GPU pricing refresh (worker/src/gpu-pricing.ts): every 4 hours at :15
  # past, poll RunPod (if RUNPOD_API_KEY set) and write the unified
  # snapshot to gpu:current. Powers /api/gpu/pricing and
  # /api/gpu/pricing/cheapest. Vast.ai removed 2026-05-06 (ToS).
  "15 */4 * * *",
  # Daily 12:45 AM UTC: capture a daily GPU pricing snapshot for the
  # historical series. Compounds into /api/gpu/pricing/series.
  "45 0 * * *",
  # Daily 6 AM UTC: ingest nflverse-data CSV releases (players, schedule)
  # and write to KV. CC-BY-4.0 source, attribution shipped on every
  # response. Powers /api/sports/nfl/players and /api/sports/nfl/schedule.
  "0 6 * * *",
  # Daily 03:30 UTC: refresh weekly download counts for the curated AI/ML
  # npm package list via the documented public api.npmjs.org/downloads
  # endpoint. Powers /api/packages/npm/ai-trending.
  "30 3 * * *",
  # Daily 04:00 UTC: refresh top AI research institutions (OpenAlex CC0).
  # Two API calls: group_by works on the AI concept, enrich top-N. Powers
  # /api/research/institutions/ai.
  "0 4 * * *",
  # Daily 05:00 UTC: refresh US BLS economic indicators (CPI, core CPI,
  # PPI, unemployment, payrolls, hourly earnings, weekly hours, labor
  # force participation, JOLTS). Public domain. 10 series x 1 GET each
  # via api.bls.gov V1 unregistered (25/day per IP). Powers
  # /api/economy/bls/indicators.
  "0 5 * * *",
  # X/Twitter: 1 post/day, re-enabled 2026-04-12 after spam flag on 2026-04-04.
  # Hold at 1/day for 30 clean days before bumping to 2/day ("30 8,17 * * *").
  "30 14 * * *",
]

[[kv_namespaces]]
binding = "TENSORFEED_NEWS"
id = "4924c4d8a64446cea111fd63a5b3455a"

[[kv_namespaces]]
binding = "TENSORFEED_STATUS"
id = "68eec8e4d37349a6adc1278c9280f653"

[[kv_namespaces]]
binding = "TENSORFEED_CACHE"
id = "4de30d8becd24b3bba9556b98bad8e69"

# Persistent OFAC sanctions-block audit log. Written to by screenWalletOFAC
# when a sanctioned wallet attempts to mint credits. 7-year TTL per the
# Privacy Policy s4B retention statement (April 28, 2026 legal hardening).
[[kv_namespaces]]
binding = "OFAC_AUDIT_LOG"
id = "432951e9eeea420bafc8a5184a50b872"

[vars]
ENVIRONMENT = "production"
SITE_URL = "https://tensorfeed.ai"
INDEXNOW_KEY = "5903913788b6a62e3d10e63e3319020a"
ALERT_EMAIL_TO = "evan@tensorfeed.ai"
ALERT_EMAIL_FROM = "alerts@tensorfeed.ai"
# RESEND_API_KEY is a secret. Set with: wrangler secret put RESEND_API_KEY
# ADMIN_KEY is a secret guarding /api/admin/* and /api/refresh.
# REQUIRED in production; admin endpoints default-deny if unset.
# Set with: wrangler secret put ADMIN_KEY
# Replaces the prior ?key=<ENVIRONMENT> auth, which became unsafe once
# the repo went public (ENVIRONMENT="production" is in this file).

# Agent payments (Phase 1). USDC on Base, credits-first with x402 fallback.
PAYMENT_WALLET = "0x549c82e6bfc54bdae9a2073744cbc2af5d1fc6d1"
PAYMENT_ENABLED = "true"
# BASE_RPC_URL defaults to https://mainnet.base.org if unset.
# For production rate limits, set to an Alchemy/QuickNode endpoint and
# add the API key as a secret: wrangler secret put ALCHEMY_API_KEY
# BASE_RPC_URL = "https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
