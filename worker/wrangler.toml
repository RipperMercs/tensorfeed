name = "tensorfeed-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Routes must live at the root of wrangler.toml (above any [section]
# header), because TOML scoping rules attach later keys to whichever table
# header was last seen. Earlier this lived under [observability] by
# accident and wrangler warned "Unexpected fields found in observability
# field: routes", which silently meant our route changes never reached
# Cloudflare. Production /api/* keeps working only because those routes
# also exist in the CF dashboard.
routes = [
  { pattern = "tensorfeed.ai/api/*", zone_name = "tensorfeed.ai" },
  # Trailing * on the single-file patterns is required: Cloudflare Pages
  # default-routes the zone, and exact-path worker routes (no wildcard) lose
  # the tie. /feed/* works because it is already a wildcard.
  { pattern = "tensorfeed.ai/feed.xml*", zone_name = "tensorfeed.ai" },
  { pattern = "tensorfeed.ai/feed.json*", zone_name = "tensorfeed.ai" },
  { pattern = "tensorfeed.ai/feed/*", zone_name = "tensorfeed.ai" },
  # mcp.tensorfeed.ai vanity host for the hosted MCP endpoint. BlockRun-
  # pattern parity: mcp.<site> is the agent-onboarding norm. Worker host
  # normalization (see worker/src/index.ts top of fetch) rewrites the path
  # to /api/mcp so the existing dispatch handles it without duplication.
  # Requires the mcp DNS record (AAAA -> 100::, proxied) on the
  # tensorfeed.ai zone in Cloudflare dashboard.
  { pattern = "mcp.tensorfeed.ai/*", zone_name = "tensorfeed.ai" }
]

# Cloudflare Workers Observability. Captures structured request logs +
# console output for query via the Workers Observability API. Used by
# the /api/mcp/activity public dashboard (which queries call counts by
# tool) and by the operator-side query_worker_observability MCP tool.
# Head sampling at 100% during initial rollout to capture all MCP
# traffic; revisit if cost exceeds the Workers Paid bundle (50M
# observability events/month free as of 2026-05).
[observability]
enabled = true
head_sampling_rate = 1.0

[triggers]
crons = [
  "*/10 * * * *",
  "*/2 * * * *",
  "0 * * * *",
  # Every 2 hours at :25 past (00:25, 02:25, 04:25, ...): podcast feeds
  # (10 sources, weekly release cadence). Renamed from "0 */2 * * *" on
  # 2026-05-25 because the original collided with "0 4 * * *" at the 04:00
  # UTC slot: Cloudflare fires a single scheduled() event for any timestamp,
  # and the cron expression it surfaces in event.cron is whichever pattern
  # registered first in the triggers array. That meant 0 4's branch in the
  # worker dispatch was never reached after 2026-05-15. :25 is unused by
  # any other daily fixed-time cron, so it stays collision-free.
  "25 */2 * * *",
  "0 7 * * *",
  "30 8 * * *",
  # Daily 15:00 UTC: email evan@tensorfeed.ai a digest of new agent-work
  # gig listings posted to the public jobs board in the last 24 hours
  # (worker/src/jobs-digest.ts). 08:00 America/Los_Angeles during PDT,
  # 07:00 during PST (accepted seasonal drift). No email on a zero-
  # activity day; the cron-status log is the heartbeat. Slot 15:00 UTC
  # is otherwise unused; nearest neighbors are 0/15/30 14 and the
  # 27 * * * * x402 probe, so no trigger collision.
  "0 15 * * *",
  # Daily 9:30 AM UTC: capture MCP server registry telemetry from
  # registry.modelcontextprotocol.io. Powers /api/mcp/registry/snapshot
  # (free) and /api/premium/mcp/registry/series (1 credit).
  "30 9 * * *",
  # Daily 09:53 UTC: AI Crawler Access Map rolling refresh
  # (worker/src/ai-crawler-access-feed.ts). Crawls ~1/7 of the curated
  # seed list per run, parses each site's robots.txt for per-bot allow/
  # block verdicts plus llms.txt/ai.txt presence, merges into one R2
  # snapshot, appends a flip-log on verdict changes, advances the KV
  # cursor. Powers free /api/ai-crawler-access/* and premium
  # /api/premium/ai-crawler-access/*. Slot 09:53 is collision-free:
  # minute 53 is odd (dodges */2), not a multiple of 5 (dodges */5,
  # */10, */15), not minute 0 (dodges 0 * * * *), and no other daily
  # cron fires at 09:53.
  "53 9 * * *",
  # Daily 11:00 AM UTC: capture top AI/ML papers from Semantic Scholar
  # (worker/src/papers.ts). Five fan-out queries, dedup, rank by citation
  # count. Powers free /api/papers/ai-trending plus a future premium
  # time-series endpoint over the daily papers:daily:{date} keys.
  "0 11 * * *",
  # Daily 11:30 AM UTC: capture recent arXiv submissions in
  # cs.AI/cs.LG/cs.CL/cs.CV (worker/src/arxiv.ts). Atom API, single call,
  # dedup by arxivId. Powers free /api/papers/arxiv-recent.
  "30 11 * * *",
  # Daily 12:00 UTC: capture top 30 most-downloaded models + datasets
  # from Hugging Face (worker/src/hf-trending.ts). Day-over-day deltas
  # against hf:daily:{date} become a real trending signal once we have
  # multiple days. Powers free /api/hf/trending.
  "0 12 * * *",
  # Daily 12:30 UTC: capture currently-hot GitHub issues across AI
  # topics (worker/src/hot-issues.ts). 5 fan-out search queries on
  # is:issue is:open archived:false comments:>=10 updated:>=7d ago,
  # deduped, ranked by comments. Powers free /api/issues/hot.
  "30 12 * * *",
  # Daily 13:00 UTC: capture currently-hot threads from 7 AI-relevant
  # subreddits (worker/src/reddit-trending.ts). LocalLLaMA,
  # MachineLearning, ClaudeAI, OpenAI, singularity, artificial,
  # AI_Agents. Deduped by post id, top 30 by score. Powers free
  # /api/reddit/trending.
  "0 13 * * *",
  # Daily 13:30 UTC: scan GitHub for new submission/distribution
  # opportunities (worker/src/agent-opportunities.ts). Seven fan-out
  # queries: org:anthropics, org:openai, org:microsoft (mcp/agent/skill),
  # org:modelcontextprotocol, "mcp server" stars>=10, x402 stars>=5,
  # "agent skills" stars>=10. Deduped by full_name, scored by
  # signal_weight * recency_factor + log10(stars+1), top 25.
  # Powers free /api/agents/opportunities. Drives recurring discovery
  # of vertical-marketplace repos like the financial-services + life-
  # sciences submissions in early May 2026.
  "30 13 * * *",
  # Daily 14:00 UTC: capture the OpenRouter cross-provider model
  # catalog (worker/src/openrouter-catalog.ts). 200+ models normalized
  # across 50+ inference providers with per-token pricing, context
  # window, modality, and provider metadata. Powers free
  # /api/openrouter/models.
  "0 14 * * *",
  # Daily 14:15 UTC: capture HF Daily Papers feed
  # (worker/src/hf-daily-papers.ts). Editor-curated AI papers from
  # huggingface.co/papers with HF community upvotes + discussion
  # counts. Powers free /api/papers/hf-daily. Slot 14:15 chosen to
  # avoid collision with the 14:30 X/Twitter cron.
  "15 14 * * *",
  # Active LLM endpoint probing (worker/src/probe.ts). Every 15 min:
  # POST a tiny prompt at each provider with an API key configured,
  # measure ttfb + total + status, append to a 24h ring buffer, and
  # rewrite the latest summary. Free /api/probe/latest serves the
  # summary; premium /api/premium/probe/series serves daily history.
  "*/15 * * * *",
  # Daily 5 minutes past midnight UTC: roll yesterday's per-provider
  # 24h buffer into a dated daily aggregate for premium time series.
  "5 0 * * *",
  # GPU pricing refresh (worker/src/gpu-pricing.ts): every 4 hours at :15
  # past, poll RunPod (if RUNPOD_API_KEY set) and write the unified
  # snapshot to gpu:current. Powers /api/gpu/pricing and
  # /api/gpu/pricing/cheapest. Vast.ai removed 2026-05-06 (ToS).
  "15 */4 * * *",
  # Daily 12:45 AM UTC: capture a daily GPU pricing snapshot for the
  # historical series. Compounds into /api/gpu/pricing/series.
  "45 0 * * *",
  # Daily 6 AM UTC: ingest nflverse-data CSV releases (players, schedule)
  # and write to KV. CC-BY-4.0 source, attribution shipped on every
  # response. Powers /api/sports/nfl/players and /api/sports/nfl/schedule.
  "0 6 * * *",
  # Daily 04:15 UTC: refresh SEC company tickers from data.sec.gov
  # (worker/src/sec-tickers.ts). Single ~1 MB JSON; public-domain US
  # Government work; no API key required. Powers /api/sec/company-tickers
  # as the grounding lookup for finance agents (ticker -> CIK before
  # hitting EDGAR filings or XBRL fundamentals). Slot picked to land
  # between OpenAlex (04:00) and BLS (05:00).
  "15 4 * * *",
  # Daily 04:45 UTC: capture Hugging Face Open LLM Leaderboard v2
  # (worker/src/hf-leaderboard.ts). Paginates the open-llm-leaderboard/contents
  # dataset via the public datasets-server.huggingface.co API. Normalizes
  # field names, validates >50 models + per-task coverage before commit,
  # writes hf-leaderboard:latest + hf-leaderboard:date:YYYY-MM-DD. Powers
  # free /api/hf-leaderboard/latest and the premium series endpoints once
  # multiple days accumulate. Slot picked between CVE (04:30) and BLS (05:00).
  "45 4 * * *",
  # Daily 04:50 UTC: rebuild the Agent Reputation Bureau cards
  # (worker/src/agent-reputation-rebuild.ts). Reads pay:credits, pay:tx,
  # pay:usage, pay:no-charge telemetry; assembles per-agent telemetry
  # (token-only + wallet-merged); computes metrics, composite score,
  # trust grade, flags; writes per-agent cards under agent-rep:wallet:*
  # + agent-rep:token:*, plus 5 leaderboards (window='all' in v0), daily
  # rollup, dates index, meta. Powers /api/agents/reputation/{wallet|by-token},
  # /api/agents/leaderboard, /api/agents/bans. Spec asked for 04:30 UTC but
  # that slot is held by the CVE list cron at line 128; 04:50 keeps the
  # bureau in the same early-UTC quiet zone, 5 min after HF leaderboard.
  "50 4 * * *",
  # Daily 04:30 UTC: walk the cvelistV5 GitHub repo's commit history
  # (worker/src/security-cve.ts) for the last 36h, harvest added or
  # modified CVE-* file paths, populate cve:recent ring + cve:by-date
  # index. Single-CVE record fetches are lazy from MITRE on read. License:
  # MITRE CVE Terms of Use, commercial redistribution explicitly permitted.
  # Powers /api/security/cve/* and premium /api/premium/security/cve/range.
  "30 4 * * *",
  # Daily 07:30 UTC: news-history Phase B clustering pass
  # (worker/src/news-clustering.ts). Reads yesterday's news:daily snapshot,
  # batch-embeds article titles + snippets via Workers AI
  # (@cf/baai/bge-base-en-v1.5), runs single-link cosine clustering at
  # threshold 0.82, writes news:cluster:{date}:{cid} entries with source
  # corroboration counts. Foundation for the verified-feed product.
  # Slot picked to fire 30 min after the 07:00 hourly RSS poll has
  # completed, before the 08:00 UTC HF push.
  "30 7 * * *",
  # Daily 06:30 UTC: refresh CISA Known Exploited Vulnerabilities catalog
  # (worker/src/security-kev.ts). Single ~3 MB JSON file. License: US
  # Government public domain (17 USC 105), commercial redistribution
  # explicitly permitted. Writes full catalog to kev:current, harvests
  # entries with dateAdded == today into kev:added:{date} for the
  # premium series endpoint. Slot picked between nflverse (06:00) and
  # the morning UTC quiet zone.
  "30 6 * * *",
  # Every 6h at :05 UTC: refresh SEC EDGAR filings for the AI bellwether
  # cohort (NVDA, MSFT, GOOGL, META, AAPL, AMZN, TSLA, AMD, AVGO, ORCL,
  # PLTR, ARM, TSM, SMCI). Sequential per-company fetches to stay polite
  # under SEC's 10 req/sec single-IP rate ceiling. Writes
  # sec-filings:current + per-company snapshots under
  # sec-filings:by-cik:* prefix. Free endpoint
  # /api/sec/filings/recent. Premium AI-extraction endpoints come in a
  # follow-up commit after DataPal CC's Qwen extraction pipeline lands.
  "5 */6 * * *",
  # Every 2 hours at :15 UTC: Haiku-triage open + recent-resolved AI
  # provider status incidents. Per-incident KV cache (24h TTL) means
  # re-runs of the cron reuse Haiku output. Powers free
  # /api/status/incidents/triage and premium variant. Slot picked to
  # avoid the :15 specific-hour crons (04:15 SEC, 06:15 backup, 14:15 HF
  # papers): those still fire on their own schedules; this cron fires
  # at 00:15, 02:15, 04:15 (with SEC), 06:15 (with backup), etc.
  # Independent strings, both run.
  "15 */2 * * *",
  # Daily 08:00 UTC: generate Haiku-derived news action cards for the
  # day's top ~50 articles. Per-article cache (7-day TTL) means re-runs
  # don't burn tokens. Powers free /api/news/action-cards and premium
  # /api/premium/news/action-cards (1 credit). Slot picked after the
  # 07:30 news-clustering cron completes; well before the 14:30 X cron.
  # Uses PROBE_ANTHROPIC_KEY secret (reused; existing key in probe.ts).
  "0 8 * * *",
  # Daily 05:25 UTC: snapshot TerminalFeed's coding-harness leaderboard
  # for weekly-delta computation (third AFTA federation cross-call).
  # Stores tf-harnesses:current + tf-harnesses:daily:{date}, bumps
  # tf-harnesses:index. Powers free /api/coding-harnesses/latest +
  # premium /api/premium/coding-harnesses/weekly-deltas (1 credit).
  # Slot picked between BLS (0 5) and FRED (30 5) in the quiet zone.
  "25 5 * * *",
  # Every 6 hours at :35 (00:35, 06:35, 12:35, 18:35): refresh the
  # AI-package release-velocity snapshot. Walks the curated PyPI + npm
  # AI lists, hits each registry's public JSON endpoint, harvests latest
  # version + last 10 release timestamps. Stores under pkg-releases:*
  # prefix. Powers free /api/packages/releases and premium
  # /api/premium/packages/releases/velocity (1 credit). Slot picked 20m
  # after the :15 GHSA supply-chain cron + 25m before the /15-min probe.
  "35 */6 * * *",
  # Daily 05:45 UTC: refresh the AI-package security snapshot. For every
  # package in the curated PyPI + npm AI lists (pypi-ai-packages.ts +
  # npm-ai-packages.ts), POST OSV.dev with {package: {name, ecosystem}}
  # to fetch the full vulnerability history. Parallel batches of 10.
  # Writes ai-pkg-sec:current + ai-pkg-sec:daily:{date} + bumps index.
  # Powers free /api/ai-safety/packages/security and premium
  # /api/premium/ai-safety/packages/security/radar (1 credit). Slot picked
  # between FRED (05:30) and nflverse (06:00) in the early UTC quiet zone.
  "45 5 * * *",
  # Daily 03:00 UTC: refresh the AVID (AI Vulnerability Database) snapshot
  # from github.com/avidml/avid-db (MIT, no auth). Lists the current-year
  # reports/ dir via the GitHub Contents API, parallel-fetches the 50 most-
  # recent JSON files from raw.githubusercontent.com, normalizes, writes
  # avid:current + avid:daily:{date} + bump avid:index. Uses GITHUB_TOKEN
  # when present for the higher rate limit. Powers free
  # /api/ai-safety/incidents/avid and premium
  # /api/premium/ai-safety/incidents/exposure (1 credit, derived vendor +
  # risk-domain rollups with recency-weighted exposure scoring).
  "0 3 * * *",
  # Daily 03:30 UTC: refresh weekly download counts for the curated AI/ML
  # npm package list via the documented public api.npmjs.org/downloads
  # endpoint. Powers /api/packages/npm/ai-trending.
  "30 3 * * *",
  # Daily 03:45 UTC: refresh monthly download counts for the curated
  # AI/ML PyPI package list via pypistats.org public JSON API. Sister
  # to the npm endpoint. Powers /api/packages/pypi/ai-trending.
  "45 3 * * *",
  # Daily 04:00 UTC: refresh top AI research institutions (OpenAlex CC0).
  # Two API calls: group_by works on the AI concept, enrich top-N. Powers
  # /api/research/institutions/ai.
  "0 4 * * *",
  # Daily 05:00 UTC: refresh US BLS economic indicators (CPI, core CPI,
  # PPI, unemployment, payrolls, hourly earnings, weekly hours, labor
  # force participation, JOLTS). Public domain. 10 series x 1 GET each
  # via api.bls.gov V1 unregistered (25/day per IP). Powers
  # /api/economy/bls/indicators.
  "0 5 * * *",
  # Daily 05:30 UTC: refresh FRED macro indicators (fed funds, 10Y/2Y
  # treasuries + spread, GDP, M2, mortgage rate, USD index, oil).
  # Public-domain data; requires FRED_API_KEY (free reg). Skips
  # gracefully when the secret is unset. Powers
  # /api/economy/fred/indicators.
  "30 5 * * *",
  # X/Twitter: 1 post/day, re-enabled 2026-04-12 after spam flag on 2026-04-04.
  # Hold at 1/day for 30 clean days before bumping to 2/day ("30 8,17 * * *").
  "30 14 * * *",
  # Daily 02:15 UTC: refresh the x402 publisher registry
  # (worker/src/x402-registry.ts). Crawls /.well-known/x402 on a small
  # seed list of domains (AFTA federation + future submissions), parses
  # each manifest into a normalized entry, stores under x402-reg:* prefix.
  # Powers free /api/x402-registry/snapshot and the /x402-registry web view.
  # Slot picked in the early UTC quiet zone away from all other daily crons.
  "15 2 * * *",
  # Daily 06:15 UTC: KV -> R2 backup (Layer 1 of the disaster recovery
  # plan, worker/src/backup.ts). Walks every configured KV namespace,
  # gzips each, uploads to r2://tensorfeed-backups/{date}/ with a
  # manifest.json carrying sha256 + key counts. Daily cadence picked
  # over weekly so a botched cron / migration on day N still leaves
  # day N-1 as a clean restore point. R2 storage cost is negligible
  # (~30 MB per run, free tier is 10 GB). Restore procedure in
  # docs/restore-from-backup.md. Cloudflare's cron parser rejected
  # the Sunday-only "0 6 * * 0" form, so daily it is.
  "15 6 * * *",
  # Every 6 hours at :15 UTC (00:15, 06:15, 12:15, 18:15): refresh
  # the AI/MCP/LLM supply-chain IOC feed (worker/src/
  # ai-supply-chain-iocs.ts). Pulls authenticated malware advisories
  # from GHSA, filters for AI relevance, writes a single KV snapshot
  # served at /api/security/ai-supply-chain-iocs.json. Bumped from
  # daily to 6-hourly on 2026-05-13 in response to the expanded
  # npm worm (Shai-style); 4 calls/day stays well under the 5000/hr
  # authenticated GHSA budget. Posture remains republish + cite.
  "15 */6 * * *",
  # Every hour at :27 UTC: probe every known x402 publisher's
  # /.well-known/x402.json (worker/src/x402-status.ts). Records
  # latency, manifest validity, HTTP status. Rolls up to 24h + 7d
  # uptime stats served on /x402/health. :27 slot picked to avoid
  # the :00/:10/:15/:30/:45 clusters other crons use.
  "27 * * * *",
  # Daily 06:35 UTC: crawl every seed publisher's /.well-known/x402.json,
  # merge first_seen across re-crawls, write the wallet allowlist +
  # per-publisher records to KV (worker/src/x402-index/publisher-registry.ts).
  # Powers the wallet filter used by the 5-min indexer tick. Slot is 06:35
  # rather than 06:30 because 06:30 is already held by the CISA KEV cron;
  # 06:35 is unused by any other cron in this file.
  "35 6 * * *",
  # Every 5 min: a bare trigger whose only job is to make scheduled() fire at
  # :05/:25/:35/:55, the multiples of 5 that no other cron covers. The
  # x402-index settlement indexer (cursor read, Base USDC Transfer logs
  # filtered to the wallet allowlist, daily + per-publisher rollups, cursor
  # advance; worker/src/x402-index/indexer.ts) runs on a wall-clock minute
  # gate in _runScheduled (every multiple-of-5 minute), NOT on a dispatch
  # branch for this pattern: event.cron only carries the first-registered
  # match when crons collide, so "*/5" was shadowed by */10, */15, and */2
  # and the tick ran ~4x/hour (audit #5). 5-min cadence keeps the 10-min
  # freshness SLA with one tick of margin.
  "*/5 * * * *",
]

[[kv_namespaces]]
binding = "TENSORFEED_NEWS"
id = "4924c4d8a64446cea111fd63a5b3455a"

[[kv_namespaces]]
binding = "TENSORFEED_STATUS"
id = "68eec8e4d37349a6adc1278c9280f653"

[[kv_namespaces]]
binding = "TENSORFEED_CACHE"
id = "4de30d8becd24b3bba9556b98bad8e69"

# Persistent OFAC sanctions-block audit log. Written to by screenWalletOFAC
# when a sanctioned wallet attempts to mint credits. 7-year TTL per the
# Privacy Policy s4B retention statement (April 28, 2026 legal hardening).
[[kv_namespaces]]
binding = "OFAC_AUDIT_LOG"
id = "432951e9eeea420bafc8a5184a50b872"

# R2 bucket for weekly KV backups (Layer 1 of the disaster recovery
# plan, worker/src/backup.ts). Created via the cloudflare-bindings MCP
# tool on 2026-05-12. Holds gzipped JSONL dumps of every KV namespace
# plus a manifest.json per date. Lifecycle policy: 12 weekly snapshots
# retained (~3 months); see Cloudflare dashboard for the rule.
[[r2_buckets]]
binding = "BACKUPS_R2"
bucket_name = "tensorfeed-backups"

# R2 bucket for rolling hourly snapshots (worker/src/snapshots.ts).
# Migrated off KV on 2026-05-12 to free up the 1M write/month bundle
# for hot-path writes; daily snapshot writes used ~5,760 ops/month on
# KV at $5/M (~$0.03) but compete for the bundle with everything else
# during growth. R2 storage cost is negligible (8 types × ~50 KB each
# × rolling 24h = under 10 MB total, well inside the 10 GB free tier).
# Reads go through Cache API (5 min TTL) so R2 op cost is also tiny.
[[r2_buckets]]
binding = "SNAPSHOTS_R2"
bucket_name = "tensorfeed-snapshots"

# Workers Analytics Engine datasets. Free with Workers Paid (25M
# datapoints/dataset/month). Purpose-built for high-frequency event
# logging where KV is the wrong tool.
#
# tf_honeypot_hits: per-probe records. Replaces the 2-KV-write-per-hit
# pattern that was a time bomb if a bot scan ever landed.
#
# tf_mcp_tool_calls: per-tool-call telemetry for the hosted MCP endpoint
# at /api/mcp. Replaces the per-call KV read-modify-write counter that
# would scale linearly with MCP traffic growth.
[[analytics_engine_datasets]]
binding = "HONEYPOT_AE"
dataset = "tf_honeypot_hits"

[[analytics_engine_datasets]]
binding = "MCP_TOOL_CALLS_AE"
dataset = "tf_mcp_tool_calls"

# tf_usage: agent-usage-meter full-funnel telemetry. One datapoint per
# premium / tracked-free API response (free hits, 402 probes, paid calls).
# AE writes are unmetered against the KV budget, so the high-volume funnel
# never competes for the 100k/day KV op bundle. Read via the SQL API from
# the ADMIN_KEY-gated /api/admin/usage view.
[[analytics_engine_datasets]]
binding = "USAGE_AE"
dataset = "tf_usage"

# CreditLedger Durable Object. Per-token DO instance owns the canonical
# credit balance + daily-spend counter, serializing all read-modify-
# write operations to close race conditions H-1 and H-2 from the
# 2026-05-26 premium-backend audit. See worker/src/credit-ledger.ts +
# tensorfeed-work/tier2-races/DESIGN.md. Phase 2 scaffold: binding is
# live but no production code path calls it yet; Phase 3 wires it in.
[[durable_objects.bindings]]
name = "CREDIT_LEDGER"
class_name = "CreditLedger"

[[migrations]]
tag = "v1"
new_classes = ["CreditLedger"]

# Workers AI binding for news-history Phase B clustering. Free tier
# allots 10K neurons/day which comfortably covers our daily 200-
# article embedding pass via @cf/baai/bge-base-en-v1.5. Used by
# worker/src/news-clustering.ts on the 07:30 UTC cron only; no
# request-path AI calls.
[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
SITE_URL = "https://tensorfeed.ai"
INDEXNOW_KEY = "5903913788b6a62e3d10e63e3319020a"
ALERT_EMAIL_TO = "evan@tensorfeed.ai"
ALERT_EMAIL_FROM = "alerts@tensorfeed.ai"
# CreditLedger DO debit path activation (Phase 3 of Tier 2 audit
# response, 2026-05-26). Flipped to 'true' 2026-05-26 same session as
# the Phase 3 wire-up shipped. The fallback safety net catches any DO
# error and serves the request via the legacy KV path (with its known
# bounded race), so activation is reversible by editing this back to
# 'false' and redeploying. Legacy KV path still exists for grace
# window; Phase 4 removes it after the DO path has soaked.
CREDIT_LEDGER_ENABLED = "true"
# RESEND_API_KEY is a secret. Set with: wrangler secret put RESEND_API_KEY
# ADMIN_KEY is a secret guarding /api/admin/* and /api/refresh.
# REQUIRED in production; admin endpoints default-deny if unset.
# Set with: wrangler secret put ADMIN_KEY
# Replaces the prior ?key=<ENVIRONMENT> auth, which became unsafe once
# the repo went public (ENVIRONMENT="production" is in this file).

# Agent payments (Phase 1). USDC on Base, credits-first with x402 fallback.
