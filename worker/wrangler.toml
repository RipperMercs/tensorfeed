PAYMENT_ENABLED = "true"
# BASE_RPC_URL: the payments/facilitator RPC (eth_call, receipts, balances).
# Defaults to https://mainnet.base.org if unset. Keyed Alchemy/QuickNode endpoint
# recommended (secret): wrangler secret put BASE_RPC_URL
#
# The x402 settlement INDEXER resolves its RPC as BASE_INDEXER_RPC_URL, then the
# keyed BASE_RPC_URL, then the public node. The public node throttles the Worker's
# shared Cloudflare egress, so it is the LAST resort for an unattended cron, not
# the default. The indexer windows each tick's range into BASE_RPC_GETLOGS_SPAN-
# block eth_getLogs calls, so it works on a keyed RPC that caps the span (the
# current BASE_RPC_URL allows only 10 blocks). Best setup: a logs-friendly keyed
# endpoint in BASE_INDEXER_RPC_URL with a high span (fewer calls per tick).
# BASE_INDEXER_RPC_URL = "https://base-mainnet.g.alchemy.com/v2/<key>"  # then raise the span below
BASE_RPC_GETLOGS_SPAN = "10"
