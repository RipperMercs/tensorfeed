name: Publish npm packages

# Auto-publish the JS SDK (`tensorfeed`) and MCP server
# (`@tensorfeed/mcp-server`) to npm when their package.json version
# changes. Trigger:
#   - push to main with sdk/javascript/** or mcp-server/** in the diff
#   - manual workflow_dispatch
#
# Auth: OIDC Trusted Publisher (no long-lived token).
#   Each package on npm has a Trusted Publisher pointing at this
#   workflow file in this repo. npm CLI auto-detects the GitHub OIDC
#   provider on the runner and exchanges the OIDC token for a short-
#   lived publish token. No NPM_TOKEN secret required.
#   Configured at:
#     https://www.npmjs.com/package/tensorfeed/access
#     https://www.npmjs.com/package/@tensorfeed/mcp-server/access
#
# Behavior:
#   - Each package is checked independently.
#   - For each, reads the version from package.json. Skips publish if
#     that version is already on the npm registry (idempotent re-run).
#   - --provenance attaches a cryptographic attestation that the
#     package was built and published from this specific workflow run,
#     visible as a "Verified provenance" badge on npm.
#   - On first-time publish of a scoped package, --access public is
#     passed automatically.
#   - The mirror-mcp-server.yml workflow still pushes the source code
#     to RipperMercs/tensorfeed-mcp on every push that touches
#     mcp-server/**; THIS workflow handles the npm side. The two are
#     independent.

on:
  push:
    branches: [main]
    paths:
      - 'sdk/javascript/package.json'
      - 'sdk/javascript/src/**'
      - 'sdk/javascript/README.md'
      - 'mcp-server/package.json'
      - 'mcp-server/src/**'
      - 'mcp-server/README.md'
      - 'mcp-server/server.json'
      - '.github/workflows/publish-npm.yml'
  workflow_dispatch:

jobs:
  publish-js-sdk:
    name: Publish tensorfeed (JS SDK)
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'RipperMercs/tensorfeed' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Read version
        id: ver
        working-directory: sdk/javascript
        run: |
          v=$(node -p "require('./package.json').version")
          name=$(node -p "require('./package.json').name")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Detected $name@$v"

      - name: Check if already published
        id: check
        run: |
          name="${{ steps.ver.outputs.name }}"
          v="${{ steps.ver.outputs.version }}"
          if npm view "$name@$v" version >/dev/null 2>&1; then
            echo "$name@$v already on npm; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$name@$v not yet published; will publish"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install + build
        if: steps.check.outputs.skip == 'false'
        working-directory: sdk/javascript
        run: |
          npm ci || npm install
          npm run build

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        working-directory: sdk/javascript
        run: npm publish --access public --provenance

  publish-mcp-server:
    name: Publish @tensorfeed/mcp-server
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'RipperMercs/tensorfeed' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Read version
        id: ver
        working-directory: mcp-server
        run: |
          v=$(node -p "require('./package.json').version")
          name=$(node -p "require('./package.json').name")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Detected $name@$v"

      - name: Check if already published
        id: check
        run: |
          name="${{ steps.ver.outputs.name }}"
          v="${{ steps.ver.outputs.version }}"
          if npm view "$name@$v" version >/dev/null 2>&1; then
            echo "$name@$v already on npm; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$name@$v not yet published; will publish"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install + build
        if: steps.check.outputs.skip == 'false'
        working-directory: mcp-server
        run: |
          npm ci || npm install
          npm run build

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        working-directory: mcp-server
        run: npm publish --access public --provenance
