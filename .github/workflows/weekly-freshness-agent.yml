name: Weekly Freshness Agent

# Autonomously reviews curated pages that are overdue per data/page-freshness.json,
# updates their data from cited sources, bumps the review stamp, and ships under a
# hybrid rule (auto-push low-risk, open a PR for substantive changes).
# Prerequisites (one time): repo secret ANTHROPIC_API_KEY + the Claude GitHub App
# (github.com/apps/claude) installed with contents/issues/pull-requests write.

on:
  schedule:
    - cron: "0 9 * * 1"   # Monday 09:00 UTC
  workflow_dispatch: {}    # manual trigger for the first watched run

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      # Stay green (skip cleanly) until the ANTHROPIC_API_KEY secret exists, so
      # the weekly cron does not fail before the one-time setup is done.
      - name: Verify setup
        id: pre
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ANTHROPIC_API_KEY not set. Add the repo secret and install the Claude GitHub App to enable this workflow. Skipping."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.pre.outputs.ready == 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: steps.pre.outputs.ready == 'true'
        with:
          node-version: 20

      - run: npm ci
        if: steps.pre.outputs.ready == 'true'

      - name: Show overdue pages
        if: steps.pre.outputs.ready == 'true'
        run: node scripts/freshness-audit.mjs

      - uses: anthropics/claude-code-action@v1
        if: steps.pre.outputs.ready == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 40
            --allowedTools Edit,Read,Write,Bash,Grep,WebSearch,WebFetch
          prompt: |
            You maintain the freshness of TensorFeed's curated pages. Work autonomously and finish in one run.

            STEP 1: run `node scripts/freshness-audit.mjs --json` and parse the `overdue` array. If it is empty, do nothing and stop.

            STEP 2: for EACH overdue page, read its entry in data/page-freshness.json (the `notes` field names the data file and what triggers an update). Per page, the authoritative sources to check for changes since `last_reviewed` are:
              - /models  -> data/pricing.json. Check for newly released or deprecated flagship models and pricing changes via the provider model pages (OpenAI, Anthropic, Google, Meta, Mistral, DeepSeek, xAI) and the last 7 days of TensorFeed news (run `node scripts/weekly-models-check.mjs`).
              - /ai-hardware  -> worker/src/ai-hardware.ts. Check for newly shipped datacenter AI chips (NVIDIA, AMD, Google TPU, AWS Trainium and Inferentia, Cerebras, Groq, Apple) against vendor announcements.
              - /benchmarks  -> data/benchmarks.json. Check whether a new flagship landed or rankings materially shifted (provider posts, Artificial Analysis, official benchmark sites).
              - /ai-infrastructure  -> the page and data for announced gigawatt-class AI datacenters; check for new builds or status changes (announced, permitted, construction, operational).
              - /agents  -> data/agents-directory.json. Check for notable new agent products since the last review.
              - /podcasts  -> the curated list in the page; add notable new AI podcasts, prune dead ones.
              - /timeline  -> the AI-ecosystem milestone record; add any major milestone since the last review.
              - /ai-crawler-access  -> worker/src/ai-crawler-access-seeds.ts; review the seed universe and methodology (the live numbers already refresh from the daily crawl).

            STEP 3: only make a change that is backed by a REAL source URL you found this run. NEVER invent a model, chip, price, or score. If nothing warrants a change, make NO data edit but DO bump that page's `last_reviewed` to today's date in data/page-freshness.json (a genuine "reviewed, nothing to add").

            STEP 4 (content rules, strict): NO em dashes, NO en dashes, NO double hyphens anywhere in any edit. Use commas, periods, or parentheses.

            STEP 5 (validate BEFORE shipping): run `npx tsc --noEmit` (clean) and `npx next lint` (no errors) and `npx next build` and confirm it prints "Compiled successfully". IMPORTANT: `next build` then fails the static export with about 114 `opengraph-image` "Invalid URL" prerender errors. That failure is PRE-EXISTING and ENVIRONMENTAL; IGNORE it and do NOT try to fix it. The gate is tsc clean plus lint clean plus "Compiled successfully". If you edited worker/src files, also run `cd worker && npx tsc --noEmit`. If validation fails because of YOUR change, revert that change.

            STEP 6 (ship, HYBRID rule):
              - LOW-RISK change (a last_reviewed bump, one corrected number, or adding ONE clearly-announced new entry with a cited source): commit and push directly to main. Commit message `chore(freshness): <page> <short summary>`.
              - SUBSTANTIVE change (removing entries, multiple-entry edits, prose rewrites, schema changes, or anything you are not confident about): do NOT push to main. Create a branch `freshness/<page>-<YYYY-MM-DD>`, commit there, and open a pull request titled `freshness: <page> needs review` summarizing the proposed change and its sources.

            Keep each page independent: if one page errors, continue with the rest. Summarize what you did per page at the end.
