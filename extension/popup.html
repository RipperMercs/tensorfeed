<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: #04070d; width: 760px; }
  /* The widget is its own self-contained document. The popup frames it
     for the rich view (sparklines, p95). 760px clears the widget's 720
     desktop breakpoint so the full header text ("CONDITION GREEN, ALL
     MONITORS, hh:mm:ss TZ") and all six filter chips fit without ellipsis,
     and shows the Detail column alongside sparkline. Chrome's popup
     ceiling is 800 wide by 600 tall; 760x600 leaves a 40px right gutter. */
  iframe { display: none; width: 760px; height: 600px; border: 0; }

  /* Self-contained fallback. Shown by default and rendered from
     /api/status/summary so the toolbar is NEVER blank, even if the
     remote frame is blocked (CSP / sandboxed reviewer / offline).
     iframe.onload swaps to the rich widget when it actually loads. */
  #fallback {
    width: 760px; box-sizing: border-box; padding: 14px 16px 16px;
    color: #e8eef7; font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  #fallback h1 {
    margin: 2px 0 12px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase; color: #6b7c92;
  }
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0; border-top: 1px solid rgba(120,170,220,0.12);
  }
  .row:first-of-type { border-top: 0; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .dot.green { background: #10b981; }
  .dot.amber { background: #f59e0b; }
  .dot.red   { background: #ef4444; }
  .nm { flex: 1; color: #e8eef7; }
  .pv { color: #6b7c92; font-size: 11px; }
  .st { font-size: 11px; text-transform: capitalize; color: #9fb0c5; }
  #msg { color: #9fb0c5; padding: 6px 0; }

  .bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; background: #04070d;
    border-top: 1px solid rgba(120,170,220,0.18);
    font: 600 10px ui-monospace, Menlo, monospace;
    letter-spacing: 0.16em; text-transform: uppercase; color: #6b7c92;
  }
  .bar a { color: #3a9fd6; text-decoration: none; }
  .bar a:hover { color: #e8eef7; }
</style>
</head>
<body>
  <section id="fallback" aria-live="polite">
    <h1>TensorFeed AI Status</h1>
    <div id="msg">Loading live status&hellip;</div>
    <div id="list"></div>
  </section>
  <iframe
    id="frame"
    data-src="https://tensorfeed.ai/widget/status?accent=blue&poll=30&utm_source=extension&utm_medium=popup"
    title="TensorFeed live AI status"></iframe>
  <div class="bar">
    <span>TensorFeed</span>
    <a href="https://tensorfeed.ai/status?utm_source=extension&utm_medium=popup_footer"
       target="_blank" rel="noopener">Full monitor &rarr;</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
